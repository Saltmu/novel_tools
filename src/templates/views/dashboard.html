<!-- VIEW 1: Dashboard -->
<div class="view-content active" id="view-dashboard">
    <div class="scrollable-view">
        <div class="view-title-area">
            <h2>ダッシュボード</h2>
            <p>執筆済みドラフトの管理、新規執筆、校閲ステータスの一覧。</p>
        </div>
        
        <div class="grid-3">
            <div class="card">
                <h3>Google Drive 同期状況</h3>
                <div id="drive-sync-status-area" style="font-size: 0.9rem; color: var(--text-muted); display:flex; flex-direction:column; gap:10px;">
                    <!-- Populate via API -->
                    読み込み中...
                </div>
                <button class="btn-secondary btn-sm" onclick="switchView('sync')">同期画面へ</button>
            </div>
            <div class="card">
                <h3>AI小説執筆</h3>
                <p style="font-size: 0.85rem; color: var(--text-muted);">
                    プロットに沿ったエピソードのドラフトをAIで自動生成します。
                </p>
                <button class="btn-primary btn-sm" onclick="switchView('editor'); switchEditorTab('settings');">執筆画面へ</button>
            </div>
            <div class="card">
                <h3>校閲・レビュー実行</h3>
                <p style="font-size: 0.85rem; color: var(--text-muted);">
                    ドラフトの自動校閲、編集長AIによる指摘反映、校閲エディタでの推敲を行います。
                </p>
                <button class="btn-primary btn-sm" onclick="switchView('editor'); switchEditorTab('settings');">レビュー画面へ</button>
            </div>
        </div>
    </div>
</div>
