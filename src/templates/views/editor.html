<!-- VIEW 5: Review Editor -->
<div class="view-content" id="view-editor">
    <div class="view-loading-overlay" id="editor-loading-overlay">
        <div class="spinner"></div>
        <div class="view-loading-text">読み込み中...</div>
    </div>

    <!-- Header for Editor -->
    <div class="editor-header">
        <div>
            <h3 id="novel-title" style="font-size:1.15rem; font-weight:700;">Novel Review Editor</h3>
            <p id="novel-subtitle" style="font-size:0.8rem; color:var(--text-muted)">校閲指摘の精査・反映</p>
        </div>
        <div style="display:flex; align-items:center; gap:16px;">
            <div class="stats-counter">
                採用: <span id="accepted-count">0</span> / <span id="total-count">0</span> 件
            </div>
            <div id="history-restore-container" style="display: none; align-items: center; gap: 8px;">
                <select id="select-history" style="background: var(--bg-card); color: var(--text-normal); border: 1px solid var(--border-color); border-radius: 4px; padding: 4px 8px; font-size: 0.8rem; height: 32px;"></select>
                <button class="btn-secondary btn-sm" id="btn-restore-history" onclick="confirmRestoreHistory()" style="background-color: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3);">↩️ 履歴から復元</button>
            </div>
            <button class="btn-secondary btn-sm" id="btn-rollback" onclick="confirmRollback()" style="display: none; background-color: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3);">↩️ 元に戻す</button>
            <button class="btn-primary btn-sm" onclick="confirmApply()">小説へ反映</button>
        </div>
    </div>

    <!-- Fallback/Warning Banners -->
    <div id="fallback-warning-banner" class="warning-banner" style="display: none; margin: 16px 24px 0 24px;">
        <div style="display: flex; align-items: center; gap: 8px;">
            <span>⚠️</span>
            <span id="fallback-warning-message">機械的マージのため、品質が低下している可能性があります。</span>
        </div>
    </div>
    <div id="sync-warning-banner" class="warning-banner" style="display: none; margin: 16px 24px 0 24px; background: linear-gradient(135deg, rgba(245, 158, 11, 0.15) 0%, rgba(217, 119, 6, 0.05) 100%); border-color: rgba(245, 158, 11, 0.35); color: #fbbf24; box-shadow: 0 4px 12px rgba(245, 158, 11, 0.1);">
        <div style="display: flex; align-items: center; gap: 8px;">
            <span>⚠️</span>
            <span id="sync-warning-message">設定資料（Google Drive）の同期に失敗しています。ローカルのデータが古いか、不整合な可能性があります。</span>
        </div>
    </div>

    <!-- Editor split layout -->
    <div class="editor-container">
        <!-- Left Panel: Novel Draft -->
        <div class="panel novel-panel" style="display: flex; flex-direction: column; height: 100%;">
            <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center;">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <h2 id="filename-display" style="display: inline-block; margin-right: 8px;">01_formatted.txt</h2>
                    <span id="edit-mode-badge" class="badge" style="display: none; background-color: rgba(245, 158, 11, 0.15); color: #fbbf24;">直接編集</span>
                    <span id="episode-selection-display" class="badge" style="background-color: rgba(99, 102, 241, 0.15); color: #a5b4fc; display: none;">第1話</span>
                    <span id="editor-status-badge" class="badge" style="background-color: rgba(16, 185, 129, 0.15); color: #34d399; display: none;">READY</span>
                </div>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <button class="btn-secondary btn-sm" id="btn-toggle-edit" onclick="toggleEditMode()" style="padding: 4px 8px; font-size: 0.75rem;">📝 直接編集</button>
                    <button class="btn-primary btn-sm" id="btn-save-novel" onclick="saveNovel()" style="display: none; padding: 4px 8px; font-size: 0.75rem;">💾 保存</button>
                </div>
            </div>
            <div class="novel-content-container" style="flex: 1; min-height: 0; position: relative; display: flex; flex-direction: column;">
                <div class="novel-content" id="novel-content" style="flex: 1; overflow-y: auto;">
                    <div style="text-align: center; color: var(--text-muted); padding-top: 60px;">
                        ダッシュボードで小説を選択し、「校閲」を押してください。
                    </div>
                </div>
                <textarea id="novel-editor-textarea" style="display: none; flex: 1; width: 100%; height: 100%; resize: none; background-color: #1e293b; color: #f8fafc; border: 1px solid var(--border-color); padding: 12px; font-family: monospace; font-size: 0.95rem; line-height: 1.6; border-radius: 4px; box-sizing: border-box; outline: none;" placeholder="ここに本文が表示されます"></textarea>
            </div>
        </div>

        <!-- Right Panel: Findings, Settings & Logs -->
        <div class="panel findings-panel" style="display: flex; flex-direction: column; height: 100%;">
            <div class="tabs-header" style="display: flex; gap: 4px; border-bottom: 1px solid var(--border-color); background-color: rgba(15, 23, 42, 0.4); flex-shrink: 0;">
                <button class="tab-btn active" id="tab-btn-findings" onclick="switchEditorTab('findings')" style="background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); padding: 12px 16px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border-radius: 0; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;">📋 指摘一覧</button>
                <button class="tab-btn" id="tab-btn-settings" onclick="switchEditorTab('settings')" style="background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); padding: 12px 16px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border-radius: 0; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;">⚙️ 執筆・校閲設定</button>
                <button class="tab-btn" id="tab-btn-logs" onclick="switchEditorTab('logs')" style="background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); padding: 12px 16px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border-radius: 0; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;">🖥️ ログ表示</button>
            </div>

            <!-- Tab Content 1: Findings -->
            <div class="tab-content" id="tab-content-findings" style="display: flex; flex-direction: column; flex: 1; overflow: hidden;">
                <!-- Filter Options -->
                <div class="filter-bar" style="display: flex; gap: 8px; padding: 8px 20px; border-bottom: 1px solid var(--border-color); background-color: rgba(15, 23, 42, 0.2); overflow-x: auto; flex-shrink: 0;">
                    <button class="filter-btn active" onclick="filterCategory('all', this)">すべて</button>
                    <button class="filter-btn" onclick="filterCategory('logic', this)">設定監査 (Logic)</button>
                    <button class="filter-btn" onclick="filterCategory('style', this)">文芸表現 (Style)</button>
                    <div style="width: 1px; height: 16px; background-color: var(--border-color); align-self: center; margin: 0 4px;"></div>
                    <button class="filter-btn" onclick="filterSeverity('all', this)">全重要度</button>
                    <button class="filter-btn" onclick="filterSeverity('high', this)">重大 (High)</button>
                    <button class="filter-btn" onclick="filterSeverity('medium', this)">中 (Medium)</button>
                    <button class="filter-btn" onclick="filterSeverity('low', this)">軽微 (Low)</button>
                </div>
                <div class="findings-list" id="findings-list" style="flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px;">
                    <!-- Cards populated dynamically -->
                </div>
            </div>

            <!-- Tab Content 2: Settings -->
            <div class="tab-content" id="tab-content-settings" style="display: none; padding: 20px; overflow-y: auto; flex: 1;">
                <div style="display: flex; flex-direction: column; gap: 20px;">
                    <!-- AI小説執筆 Section -->
                    <div class="card" style="padding: 16px; gap: 12px; background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">
                        <h3 style="font-size: 0.95rem; padding-bottom: 6px; margin-bottom: 4px; border-bottom: 1px solid var(--border-color);">✍️ AI小説執筆</h3>
                        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                            <button class="btn-primary btn-sm" id="btn-run-write" onclick="runAiWriting()">
                                ✍️ 執筆を開始する
                            </button>
                            <button class="btn-secondary btn-sm" id="btn-copy-prompt" onclick="copyWritingPrompt()">
                                📋 プロンプトコピー
                            </button>
                        </div>
                        <div class="form-grid" style="display: grid; grid-template-columns: 1fr; gap: 10px;">
                            <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                                <label for="write-episode" style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted);">執筆する話 (例: 第1話、第2話)</label>
                                <input type="text" id="write-episode" placeholder="第1話" style="padding: 8px 12px; font-size: 0.85rem; background-color: #0b0f19; border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main);">
                            </div>
                            <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                                <label for="write-title" style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted);">小説タイトル</label>
                                <input type="text" id="write-title" placeholder="重天の調律師" style="padding: 8px 12px; font-size: 0.85rem; background-color: #0b0f19; border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main);">
                            </div>
                            <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                                <label for="write-model" style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted);">使用するAIモデル</label>
                                <select id="write-model" style="padding: 8px 12px; font-size: 0.85rem; background-color: #0b0f19; border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main);">
                                    <option value="Gemini 3.5 Flash (High)">Gemini 3.5 Flash (High)</option>
                                </select>
                            </div>
                            <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                                <label for="write-plot" style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted);">プロットファイル</label>
                                <select id="write-plot" style="padding: 8px 12px; font-size: 0.85rem; background-color: #0b0f19; border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main);">
                                    <option value="">(デフォルト/自動解決)</option>
                                </select>
                            </div>
                            <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                                <label for="write-policy-global" style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted);">全体執筆ポリシー</label>
                                <select id="write-policy-global" style="padding: 8px 12px; font-size: 0.85rem; background-color: #0b0f19; border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main);">
                                    <option value="">(デフォルト/自動解決)</option>
                                </select>
                            </div>
                            <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                                <label for="write-policy-chapter" style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted);">章執筆ポリシー</label>
                                <select id="write-policy-chapter" style="padding: 8px 12px; font-size: 0.85rem; background-color: #0b0f19; border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main);">
                                    <option value="">(デフォルト/自動解決)</option>
                                </select>
                            </div>
                            <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                                <label for="write-character" style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted);">キャラクター概要</label>
                                <select id="write-character" style="padding: 8px 12px; font-size: 0.85rem; background-color: #0b0f19; border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main);">
                                    <option value="">(デフォルト/自動解決)</option>
                                </select>
                            </div>
                            <div class="form-group" style="display: flex; flex-direction: column; gap: 8px; margin-top: 4px;">
                                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: normal; font-size: 0.8rem; color: var(--text-muted);">
                                    <input type="checkbox" id="write-step-by-step" style="width: auto; margin: 0;">
                                    <span>段階的シーン執筆 (Step-by-Step)</span>
                                </label>
                                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: normal; font-size: 0.8rem; color: var(--text-muted);">
                                    <input type="checkbox" id="write-self-check" style="width: auto; margin: 0;">
                                    <span>ポリシー自己検知 (Self-Check)</span>
                                </label>
                                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: normal; font-size: 0.8rem; color: var(--text-muted);">
                                    <input type="checkbox" id="write-neighbor-plots" style="width: auto; margin: 0;">
                                    <span>前後話のプロットを含める</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- 本文レビュー Section -->
                    <div class="card" style="padding: 16px; gap: 12px; background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">
                        <h3 style="font-size: 0.95rem; padding-bottom: 6px; margin-bottom: 4px; border-bottom: 1px solid var(--border-color);">🔍 本文レビュー (校閲)</h3>
                        <button class="btn-primary btn-sm" id="btn-run-review" onclick="runReviewPipeline()" style="width: 100%;">
                            🔍 本文レビューを実行
                        </button>
                        <div class="form-grid" style="display: grid; grid-template-columns: 1fr; gap: 10px;">
                            <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                                <label for="review-model" style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted);">使用するAIモデル</label>
                                <select id="review-model" style="padding: 8px 12px; font-size: 0.85rem; background-color: #0b0f19; border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main);">
                                    <option value="Gemini 3.5 Flash (High)">Gemini 3.5 Flash (High)</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tab Content 3: Logs -->
            <div class="tab-content" id="tab-content-logs" style="display: none; flex: 1; flex-direction: column; overflow: hidden; background-color: #05070c;">
                <div class="console-header" style="border-top: none; background-color: #0b0f19; padding: 12px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; color: var(--text-muted); font-size: 0.75rem; flex-shrink: 0;">
                    <span>Execution Stream</span>
                    <span id="editor-console-status">READY</span>
                </div>
                <div class="console-log" id="editor-console-log" style="flex: 1; overflow-y: auto; padding: 20px; white-space: pre-wrap; word-break: break-all; color: #10b981; line-height: 1.6; font-family: 'Fira Code', monospace; font-size: 0.85rem;">--- 待機中 ---</div>
            </div>
        </div>
    </div>
</div>
