<!-- VIEW 3: AI Writing -->
<div class="view-content split-view-content" id="view-write">
    <div class="view-loading-overlay active" id="write-loading-overlay">
        <div class="spinner"></div>
        <div class="view-loading-text">AIモデルと設定資料を読み込み中...</div>
    </div>
    
    <div class="split-container">
        <!-- 左ペイン: 操作・設定 -->
        <div class="left-panel">
            <div class="left-panel-content">
                <div class="view-title-area">
                    <h2>AI小説執筆</h2>
                    <p>「<span id="novel-title-display">小説</span>」のプロットに基づき、指定された話のエピソードをAIに自動執筆させます。</p>
                    <div class="writing-features-banner" style="margin-top: 12px; font-size: 0.85rem; color: var(--text-muted); background: rgba(255,255,255,0.02); padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border-color); line-height: 1.6;">
                        <span style="font-weight: 600; color: var(--text-main); display: block; margin-bottom: 4px;">💡 執筆プロセスの特徴:</span>
                        <ul style="padding-left: 20px; margin: 0; display: flex; flex-direction: column; gap: 4px;">
                            <li>最新のキャラクター概要をコンテキストに含めます。</li>
                            <li>「執筆ポリシー」に基づいたルビや文体のリズムを自動的に再現します。</li>
                            <li>成果物は <code>novels/</code> フォルダに自動保存されます。</li>
                        </ul>
                    </div>
                </div>

                <div class="card" style="margin-top: 8px;">
                    <h3>執筆パラメーター設定</h3>
                    <div style="margin-bottom: 16px; display: flex; gap: 12px; align-items: center;">
                        <button class="btn-primary" id="btn-run-write" onclick="runAiWriting()">
                            ✍️ 執筆を開始する
                        </button>
                        <button class="console-toggle-btn" id="write-console-toggle" onclick="toggleConsole('view-write')">
                            🖥️ コンソール表示
                        </button>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="write-episode">執筆する話 (例: 第1話、第2話)</label>
                            <input type="text" id="write-episode" placeholder="第1話">
                        </div>
                        <div class="form-group">
                            <label for="write-title">小説タイトル</label>
                            <input type="text" id="write-title" placeholder="重天の調律師">
                        </div>
                        <div class="form-group">
                            <label for="write-model">使用するAIモデル</label>
                            <select id="write-model">
                                <option value="Gemini 3.5 Flash (High)">Gemini 3.5 Flash (High)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="write-plot">プロットファイル</label>
                            <select id="write-plot">
                                <option value="">(デフォルト/自動解決)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="write-policy-global">全体執筆ポリシー</label>
                            <select id="write-policy-global">
                                <option value="">(デフォルト/自動解決)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="write-policy-chapter">章執筆ポリシー</label>
                            <select id="write-policy-chapter">
                                <option value="">(デフォルト/自動解決)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="write-character">キャラクター概要</label>
                            <select id="write-character">
                                <option value="">(デフォルト/自動解決)</option>
                            </select>
                        </div>
                        <div class="form-group" style="grid-column: span 2; display: flex; gap: 24px; margin-top: 8px;">
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: normal;">
                                <input type="checkbox" id="write-step-by-step" style="width: auto; margin: 0;">
                                <span>段階的シーン執筆 (Step-by-Step)</span>
                            </label>
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: normal;">
                                <input type="checkbox" id="write-self-check" style="width: auto; margin: 0;">
                                <span>ポリシー自己検知 (Self-Check)</span>
                            </label>
                        </div>
                    </div>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 8px; margin-bottom: 4px;">
                        ※プロットファイルに存在するエピソード名を正確に入力してください。
                    </p>
                </div>
            </div>
        </div>

        <!-- 右ペイン: リアルタイムコンソール -->
        <div class="right-panel" id="write-right-panel">
            <div class="console-header">
                <span>AI Generation Stream</span>
                <span id="write-console-status">READY</span>
            </div>
            <div class="console-log" id="write-console-log">--- 待機中 ---</div>
        </div>
        
        <!-- ドラッグリサイザー -->
        <div class="resizer-bar" id="write-resizer"></div>
    </div>
</div>
