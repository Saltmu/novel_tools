<!-- VIEW 4: Review Pipeline -->
<div class="view-content split-view-content" id="view-review">
    <div class="split-container">
        <!-- 左ペイン: 設定 -->
        <div class="left-panel">
            <div class="left-panel-content">
                <div class="view-title-area">
                    <h2>本文レビュー</h2>
                    <p>設定監査と文芸表現の並列チェック、および編集長AIによる競合解消パイプラインを実行します。</p>
                </div>

                <div class="card">
                    <h3>校閲パラメーター設定</h3>
                    <div class="form-grid" style="margin-bottom: 16px;">
                        <div class="form-group">
                            <label for="review-model">使用するAIモデル</label>
                            <select id="review-model">
                                <option value="Gemini 3.5 Flash (High)">Gemini 3.5 Flash (High)</option>
                            </select>
                        </div>
                    </div>

                    <h3>校閲対象のドラフトファイルを選択</h3>
                    <div style="margin-bottom: 16px; display: flex; gap: 12px; align-items: center;">
                        <button class="btn-primary" id="btn-run-review" onclick="runReviewPipeline()">
                            🔍 本文レビューを実行
                        </button>
                        <button class="console-toggle-btn" id="review-console-toggle" onclick="toggleConsole('view-review')">
                            🖥️ コンソール表示
                        </button>
                    </div>
                    <div class="form-group">
                        <div class="draft-cards-container" id="review-draft-cards-container">
                            <!-- Populated via API -->
                            <div style="text-align: center; color: var(--text-muted); padding: 20px;">読み込み中...</div>
                        </div>
                        <input type="hidden" id="review-file-select" value="">
                    </div>
                </div>
            </div>
        </div>

        <!-- 右ペイン: プレビュー＆リアルタイムコンソール -->
        <div class="right-panel" id="review-right-panel">
            <!-- プレビューモードのヘッダー -->
            <div class="console-header" id="review-preview-header">
                <span>📄 小説本文プレビュー: <span id="preview-filename-display">-</span></span>
                <span style="font-size: 0.8rem; color: var(--text-muted)">プレビュー表示中</span>
            </div>
            <!-- コンソールモードのヘッダー -->
            <div class="console-header" id="review-console-header" style="display: none;">
                <span>Review Pipeline Console</span>
                <span id="review-console-status">READY</span>
            </div>

            <!-- プレビュー表示ボディ -->
            <div id="review-preview-body" style="flex: 1; padding: 20px; overflow-y: auto; white-space: pre-wrap; font-family: 'Sawarabi Mincho', serif; line-height: 1.8; color: #cbd5e1; font-size: 0.95rem; background-color: #0b0f19;">
                ファイルを選択するとプレビューが表示されます。
            </div>
            <!-- コンソールログ表示ボディ -->
            <div class="console-log" id="review-console-log" style="display: none;">--- 待機中 ---</div>
        </div>
        
        <!-- ドラッグリサイザー -->
        <div class="resizer-bar" id="review-resizer"></div>
    </div>
</div>
